<!DOCTYPE html>
<html>
  <head>
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <title>mrlldd</title>
    <meta charset="utf-8" />
    <script>
      const segmentCount = 0;
      const l = window.location;
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?p=/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
